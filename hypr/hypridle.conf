# migration-hypridle.conf - separate configuration for hypridle
# extracted from ~/.config/hypr/hypr/hypridle.conf

# general

general {
    lock_cmd = pidof hyprlock || hyprlock && notify-send "Welcome back, $(whoami)!"
    # Lock command
    # The 'pidof hyprlock ||' part prevents multiple hyprlocks from launching

    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on 
    # so screen wakes up instantly
}

# listeners and their timeouts

listener {
    timeout = 300     
    on-timeout = carbon.brightness save && carbon.brightness set 20
    on-resume = carbon.brightness restore         
}

listener {
    timeout = 420
    on-timeout = loginctl lock-session  
}

listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off                            
    on-resume = hyprctl dispatch dpms on && brightnessctl -r        
}

listener {
    timeout = 1800
    on-timeout = systemctl suspend           
}

# note: moved 'exec-once = hypridle' from autostart in migration.conf